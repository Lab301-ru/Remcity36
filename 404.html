<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>404 — Страница не найдена · Ремсити36</title>
<meta name="robots" content="noindex, nofollow">
<link rel="icon" href="logo-96.webp" type="image/webp">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,700;12..96,800&family=JetBrains+Mono:wght@400;500;600&family=Manrope:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0a;--text:#f0ede8;--text-dim:rgba(240,237,232,.5);--accent:#ff5b1f;
  --line:rgba(255,255,255,.08);--display:'Bricolage Grotesque',sans-serif;
  --mono:'JetBrains Mono',monospace;--sans:'Manrope',sans-serif;
}
html,body{height:100%}
body{
  background:var(--bg);color:var(--text);
  font-family:var(--sans);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:100vh;padding:40px 24px;text-align:center;
  overflow:hidden;
}
/* noise */
body::before{
  content:'';position:fixed;inset:0;opacity:.035;mix-blend-mode:overlay;pointer-events:none;
  background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='240' height='240'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
}
.code{
  font-family:var(--mono);font-size:11px;letter-spacing:.2em;
  text-transform:uppercase;color:var(--accent);margin-bottom:32px;
}
h1{
  font-family:var(--display);font-weight:800;
  font-size:clamp(80px,18vw,220px);
  line-height:1;letter-spacing:-0.04em;
  color:var(--text);margin-bottom:8px;
}
h1 span{
  -webkit-text-stroke:2px var(--text);color:transparent;
}
.sub{
  font-family:var(--display);font-weight:500;font-style:italic;
  font-size:clamp(22px,4vw,40px);color:var(--accent);
  margin-bottom:24px;letter-spacing:-0.02em;
}
.desc{
  font-family:var(--mono);font-size:13px;letter-spacing:.06em;
  color:var(--text-dim);max-width:420px;line-height:1.7;
  margin-bottom:48px;
}
.actions{display:flex;gap:12px;flex-wrap:wrap;justify-content:center}
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  padding:14px 28px;border-radius:3px;
  font-family:var(--mono);font-size:12px;font-weight:600;
  letter-spacing:.1em;text-transform:uppercase;
  text-decoration:none;white-space:nowrap;
  transition:all .2s ease;
  box-shadow:0 0 24px rgba(255,255,255,.16),0 0 8px rgba(255,255,255,.12);
}
.btn-primary{background:var(--accent);border:1px solid var(--accent);color:#fff}
.btn-primary:hover{background:#ff7a47;border-color:#ff7a47}
.btn-ghost{background:transparent;border:1px solid rgba(255,255,255,.2);color:var(--text)}
.btn-ghost:hover{border-color:var(--text);background:rgba(255,255,255,.04)}
.foot{
  position:fixed;bottom:24px;
  font-family:var(--mono);font-size:10px;letter-spacing:.16em;
  text-transform:uppercase;color:rgba(255,255,255,.2);
}
</style>
</head>
<body>
  <div class="code">● STN VRN-36 / ERROR · 404</div>
  <h1>4<span>0</span>4</h1>
  <p class="sub">Страница не найдена.</p>
  <p class="desc">Такой страницы не существует или она была удалена. Проверьте адрес или вернитесь на главную.</p>
  <div class="actions">
    <a href="/" class="btn btn-primary">
      <svg viewBox="0 0 24 24" fill="currentColor" width="14" height="14"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
      На главную
    </a>
    <a href="/news" class="btn btn-ghost">Журнал →</a>
  </div>
  <div class="foot">© 2026 Ремсити·36 / Воронеж</div>
</body>
</html>
